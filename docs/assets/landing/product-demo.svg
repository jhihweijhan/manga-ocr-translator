          <text x="34" y="79" fill="#20312d" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800">えっ?</text>
          <text x="294" y="30" fill="#173530" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800">區塊譯文</text>
