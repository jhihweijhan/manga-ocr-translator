<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Manga OCR Translator product demo</title>
  <desc id="desc">A static product-style screenshot showing one manga image beside editable OCR text blocks and translated block text.</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#173530" flood-opacity="0.16"/>
    </filter>
    <clipPath id="pageClip">
      <rect x="62" y="86" width="422" height="548" rx="8"/>
    </clipPath>
  </defs>

  <rect width="1280" height="720" fill="#eef6f3"/>
  <rect x="28" y="30" width="1224" height="660" rx="18" fill="#f9fbfa" stroke="#20312d" stroke-width="2"/>

  <g transform="translate(50 58)">
