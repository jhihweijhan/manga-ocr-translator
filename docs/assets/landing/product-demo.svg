        <path d="M86 450c80-52 204-52 374 0v22H86z" fill="#1aa27b"/>
        <ellipse cx="366" cy="198" rx="78" ry="42" fill="#ffffff" stroke="#20312d" stroke-width="5"/>
        <path d="M326 236l-18 38 48-30" fill="#ffffff" stroke="#20312d" stroke-width="5" stroke-linejoin="round"/>
        <text x="312" y="196" fill="#20312d" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800">えっ?</text>
        <ellipse cx="190" cy="388" rx="94" ry="38" fill="#ffffff" stroke="#20312d" stroke-width="5"/>
        <path d="M246 421l42 30-18-40" fill="#ffffff" stroke="#20312d" stroke-width="5" stroke-linejoin="round"/>
