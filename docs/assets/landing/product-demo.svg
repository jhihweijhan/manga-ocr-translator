          <text x="18" y="30" fill="#173530" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800">狀態</text>
          <text x="18" y="54" fill="#20312d" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18">正在校對第 1／共 2 段</text>
          <rect x="362" y="20" width="156" height="36" rx="18" fill="#173530"/>
          <text x="392" y="44" fill="#f5fbf8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800">匯出純譯文 TXT</text>
        </g>
      </g>
