          <text x="310" y="79" fill="#20312d" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800">咦？</text>
        </g>

        <g transform="translate(0 236)">
          <rect width="546" height="128" rx="8" fill="#ffffff" stroke="#d5e1dc" stroke-width="2"/>
          <text x="18" y="30" fill="#173530" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800">block-2 修正原文</text>
          <rect x="18" y="46" width="232" height="54" rx="6" fill="#edf5f2" stroke="#bed2ca"/>
          <text x="34" y="79" fill="#20312d" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800">行こう</text>
          <text x="294" y="30" fill="#173530" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800">區塊譯文</text>
